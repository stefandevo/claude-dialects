name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/app/dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: internal/app/dashboard
        run: npm ci

      - name: Typecheck dashboard
        working-directory: internal/app/dashboard
        run: npm run typecheck

      - name: Test dashboard
        working-directory: internal/app/dashboard
        run: npm test

      - name: Build dashboard
        working-directory: internal/app/dashboard
        run: npm run build

      - name: Verify dashboard assets
        run: |
          git ls-files --error-unmatch -- internal/app/dashboard/dist/index.html >/dev/null
          test -z "$(git ls-files --others --exclude-standard -- internal/app/dashboard/dist)"
          git diff --exit-code -- internal/app/dashboard/dist

      - name: Verify formatting
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [[ -n "${files}" ]]; then
            echo "The following files need gofmt:"
            echo "${files}"
            exit 1
          fi

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

      - name: Verify generated notices
        run: |
          ./scripts/generate-third-party-notices.sh
          git diff --exit-code -- THIRD_PARTY_NOTICES.md

      - name: Build macOS binary
        run: make build VERSION=ci
