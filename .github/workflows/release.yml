name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: signed darwin-arm64 release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH."
            exit 1
          fi

      - name: Test
        run: |
          go mod verify
          go test ./...
          go vet ./...

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${CERTIFICATE_P12}" || -z "${CERTIFICATE_PASSWORD}" ]]; then
            echo "Apple Developer ID signing secrets are not configured."
            exit 1
          fi
          KEYCHAIN="${RUNNER_TEMP}/release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          echo "${CERTIFICATE_P12}" | base64 --decode > "${RUNNER_TEMP}/certificate.p12"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security import "${RUNNER_TEMP}/certificate.p12" \
            -k "${KEYCHAIN}" \
            -P "${CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "${KEYCHAIN}"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${KEYCHAIN_PASSWORD}" \
            "${KEYCHAIN}"

      - name: Build and sign
        env:
          SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          if [[ -z "${SIGNING_IDENTITY}" ]]; then
            echo "APPLE_SIGNING_IDENTITY repository variable is not configured."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          make build VERSION="${VERSION}"
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "${SIGNING_IDENTITY}" \
            dist/dialect
          codesign --verify --strict --verbose=2 dist/dialect

      - name: Generate release notices
        run: ./scripts/generate-third-party-notices.sh

      - name: Package
        shell: bash
        run: |
          ASSET="dialect_${GITHUB_REF_NAME#v}_darwin_arm64"
          mkdir -p "release/${ASSET}"
          cp dist/dialect LICENSE README.md THIRD_PARTY_NOTICES.md "release/${ASSET}/"
          ditto -c -k --keepParent "release/${ASSET}" "release/${ASSET}.zip"

      - name: Notarize
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        shell: bash
        run: |
          if [[ -z "${APPLE_API_KEY_P8}" || -z "${APPLE_API_KEY_ID}" || -z "${APPLE_API_ISSUER_ID}" ]]; then
            echo "Apple notarization secrets are not configured."
            exit 1
          fi
          KEY_FILE="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY_P8}" > "${KEY_FILE}"
          xcrun notarytool submit release/*.zip \
            --key "${KEY_FILE}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait

      - name: Create checksums
        working-directory: release
        run: shasum -a 256 ./*.zip > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            release/*.zip
            release/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/*.zip \
            release/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
